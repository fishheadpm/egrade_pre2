<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英検準二級 学習アプリ</title>
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
<div class="container">
  <h1>英検準二級 学習アプリ</h1>
  <div id="seriesScreen">
    <h2>回を選択</h2>
    <div id="seriesButtons"></div>
  </div>
  <div id="menuScreen" class="hidden">
    <h2 id="roundTitle"></h2>
    <button onclick="start()">最初から</button>
    <button onclick="continueGame()">続きから</button>
    <button onclick="showHistory()">間違えた履歴</button>
    <button onclick="reset()">履歴リセット</button>
    <button onclick="back()">戻る</button>
  </div>
  <div id="quizScreen" class="hidden">
    <p id="progress"></p>
    <h2 id="question"></h2>
    <button onclick="showAnswer()">答え表示</button>
    <div id="answerArea" class="hidden">
      <p class="label">答え</p>
      <p id="answer"></p>
      <button onclick="correct()">正解</button>
      <button onclick="wrong()">間違い</button>
      <button onclick="backToMenu()">メニューに戻る</button>
    </div>
  </div>
</div>
<script src="app.js?v=1"></script>
</body>
</html>
